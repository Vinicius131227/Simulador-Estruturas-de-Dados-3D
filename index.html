<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Simulador 3D - Estruturas de Dados</title>
</head>
<body>

    <div id="gui-container">
        <h2>Simulador 3D</h2>
        
        <h3>Estruturas</h3>
        <div class="menu-group">
            <button onclick="window.setEstrutura('ordenacao')">Ordenação</button>
            <button onclick="window.setEstrutura('pilha')">Pilha</button>
            <button onclick="window.setEstrutura('fila')">Fila</button>
            <button onclick="window.setEstrutura('lista')">Lista</button>
            <button onclick="window.setEstrutura('arvore')">Árvore</button>
            <button onclick="window.setEstrutura('grafo')">Grafo</button>
            <button onclick="window.setEstrutura('matriz')">Matriz</button>
        </div>

        <div id="panel-ordenacao" class="controles-algoritmo hidden">
            <h3>Algoritmo</h3>
            <select id="select-sort">
                <option value="bubble">Bubble Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="quick">Quick Sort</option>
                <option value="heap">Heap Sort</option>
            </select>
            
            <div class="flex">
                <button id="btn-start-auto" style="background: #004422;">AUTO</button>
                <button id="btn-start-step" style="background: #444400;">STEP</button>
            </div>

            <button id="btn-next-step" class="hidden" style="width:100%; margin-top:8px; background:#0044ff;">
                PRÓXIMO PASSO ➡
            </button>

            <div class="flex" style="margin-top: 10px;">
                <button id="btn-pause-sort">PAUSA/PLAY</button>
                <button id="btn-reset-sort" style="background:#661111;">RESETAR</button>
            </div>

            <h3>Velocidade</h3>
            <input type="range" id="sort-speed" min="10" max="1000" value="800">
        </div>

        <div id="panel-linear" class="controles-algoritmo hidden">
            <h3 id="titulo-linear">Operações</h3>
            
            <select id="select-tipo-fila" class="hidden">
                <option value="simples">Fila Simples</option>
                <option value="prioridade">Fila Prioridade</option>
                <option value="circular">Fila Circular</option>
            </select>

            <select id="select-tipo-lista" class="hidden">
                <option value="simples">Lista Simples</option>
                <option value="dupla">Lista Dupla</option>
                <option value="circular">Lista Circular</option>
            </select>

            <div id="inputs-lista" class="input-box hidden">
                <label style="font-size: 0.7em; color: #fff;">VALOR (Número da Bola):</label>
                <input type="number" id="input-valor" placeholder="Ex: 42 (Deixe vazio p/ aleatório)">
                
                <label style="font-size: 0.7em; color: #00ffcc; display: block; margin-top: 8px;">ÍNDICE (Posição na Lista):</label>
                <input type="number" id="input-indice" placeholder="Ex: 0, 1 (Deixe vazio p/ fim)">
            </div>

            <div class="flex">
                <button id="btn-add">ADICIONAR</button>
                <button id="btn-remove">REMOVER</button>
            </div>
            <button id="btn-buscar" style="width:100%; margin-top:8px; background:#6600cc;">BUSCAR VALOR</button>
        </div>

        <div id="panel-grafo" class="controles-algoritmo hidden">
            <h3>Algoritmos</h3>
            <button id="btn-dijkstra" style="width:100%; margin-bottom:5px;">Dijkstra</button>
            <button id="btn-bellman" style="width:100%;">Bellman-Ford</button>
        </div>

        <div class="info-footer">
            Câmera: <kbd>C</kbd> | Inserir: <kbd>W</kbd> | Remover: <kbd>S</kbd>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
