<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador 3D - Estruturas de Dados</title>
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #000; 
        }
        
        #gui-container {
            position: absolute; 
            top: 20px; 
            left: 20px; 
            width: 300px;
            background: rgba(20, 20, 20, 0.95); 
            color: white; 
            padding: 20px;
            border-radius: 12px; 
            border: 1px solid #444; 
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
        }

        h2 { 
            color: #00ffcc; 
            text-align: center; 
            margin-top: 0; 
            font-size: 1.4em;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        h3 {
            font-size: 0.9em;
            color: #aaa;
            margin: 15px 0 8px 0;
            text-transform: uppercase;
        }

        .menu-group { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 6px; 
            margin-bottom: 15px; 
        }

        button {
            padding: 10px; 
            background: #2a2a2a; 
            border: 1px solid #444;
            color: white; 
            cursor: pointer; 
            border-radius: 5px; 
            font-weight: bold;
            transition: all 0.2s ease;
        }

        button:hover { 
            background: #00ffcc; 
            color: black; 
            border-color: #00ffcc;
        }

        .controles-algoritmo { 
            background: rgba(255,255,255,0.03); 
            padding: 12px; 
            border-radius: 8px; 
            border: 1px solid #333;
        }

        .hidden { display: none !important; }

        select, input[type="range"] { 
            width: 100%; 
            margin: 10px 0; 
            background: #111;
            color: white;
            border: 1px solid #444;
            padding: 5px;
            border-radius: 4px;
        }

        .flex { 
            display: flex; 
            gap: 5px; 
            margin-top: 5px; 
        }

        .flex button { flex: 1; }

        kbd {
            background: #444;
            padding: 2px 5px;
            border-radius: 3px;
            font-family: monospace;
        }

        .info-footer {
            margin-top: 15px;
            font-size: 0.75em;
            color: #777;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="gui-container">
        <h2>Simulador 3D</h2>
        
        <h3>Estruturas</h3>
        <div class="menu-group">
            <button onclick="window.setEstrutura('ordenacao')">Ordenação</button>
            <button onclick="window.setEstrutura('pilha')">Pilha</button>
            <button onclick="window.setEstrutura('fila')">Fila</button>
            <button onclick="window.setEstrutura('arvore')">Árvore</button>
            <button onclick="window.setEstrutura('grafo')">Grafo</button>
            <button onclick="window.setEstrutura('matriz')">Matriz</button>
        </div>

        <div id="panel-ordenacao" class="controles-algoritmo hidden">
            <h3>Configuração Sort</h3>
            <select id="select-sort">
                <option value="bubble">Bubble Sort</option>
                <option value="selection">Selection Sort</option>
                <option value="insertion">Insertion Sort</option>
                <option value="quick">Quick Sort</option>
                <option value="heap">Heap Sort</option>
            </select>
            
            <div class="flex">
                <button id="btn-start-auto" style="background: #004422;">AUTOMÁTICO</button>
                <button id="btn-start-step" style="background: #444400;">PASSO A PASSO</button>
            </div>

            <button id="btn-next-step" class="hidden" style="width:100%; margin-top:8px; background:#0044ff;">
                PRÓXIMO PASSO ➡
            </button>

            <div class="flex" style="margin-top: 10px;">
                <button id="btn-pause-sort">PAUSA/PLAY</button>
                <button id="btn-reset-sort" style="background:#661111;">RESETAR</button>
            </div>

            <h3 style="font-size: 0.7em;">Velocidade da Animação</h3>
            <input type="range" id="sort-speed" min="10" max="1000" value="800">
        </div>

        <div id="panel-linear" class="controles-algoritmo hidden">
            <h3>Operações</h3>
            <div class="flex">
                <button id="btn-add">ADICIONAR (W)</button>
                <button id="btn-remove">REMOVER (S)</button>
            </div>
        </div>

        <div id="panel-grafo" class="controles-algoritmo hidden">
            <h3>Algoritmos</h3>
            <button id="btn-dijkstra" style="width:100%; margin-bottom:5px;">Dijkstra (Caminho)</button>
            <button id="btn-bellman" style="width:100%;">Bellman-Ford (Ciclo)</button>
        </div>

        <div class="info-footer">
            Pressione <kbd>C</kbd> para alternar a câmera
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="main.js"></script>
</body>
</html>
